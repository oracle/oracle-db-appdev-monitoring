
services:
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
    ports:
      - 9090:9090
    restart: unless-stopped
    volumes:
      - ./prometheus:/etc/prometheus
      - prom_data:/prometheus

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - 3000:3000
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=grafana
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboard.yaml:/etc/grafana/provisioning/dashboards/main.yaml
      - ./grafana/dashboards:/var/lib/grafana/dashboards

  free23ai:
    image: gvenzl/oracle-free:23.26.1-slim-faststart
    container_name: free23ai
    ports:
      - 1521:1521
    environment:
      - ORACLE_PASSWORD=Welcome12345
    volumes:
      - ./oracle:/container-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "lsnrctl status | grep READY"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  second23ai:
    image: gvenzl/oracle-free:23.26.1-slim-faststart
    container_name: second23ai
    ports:
      - 1522:1521
    environment:
      - ORACLE_PASSWORD=Welcome12345
    volumes:
      - ./oracle:/container-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "lsnrctl status | grep READY"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  exporter:
    image: container-registry.oracle.com/database/observability-exporter:2.2.2
    container_name: exporter
    command:
      - --config.file=/exporter/${COMPOSE_CONFIG_FILE}
      # - '--log.level=debug'
      # - '--database.maxIdleConns=10'
      # - '--database.maxOpenConns=10'
    ports:
      - 9161:9161
    environment:
    # If using wallet, these can bet set. Otherwise, not necessary to supply.
    - TNS_ADMIN=${TNS_ADMIN}
    - ADB_USERNAME=${ADB_USERNAME}
    - ADB_PASSWORD=${ADB_PASSWORD}
    - ADB_TNS_ALIAS=${ADB_TNS_ALIAS}
    #   - DB_USERNAME=pdbadmin
    #   - DB_PASSWORD=Welcome12345
    #   - DB_CONNECT_STRING=free23ai:1521/freepdb1
    #   - CUSTOM_METRICS=/exporter/txeventq-metrics.toml,/exporter/more-txeventq-metrics.toml
    volumes:
      - ./exporter:/exporter
      - ./wallet:/exporter/wallet

    depends_on: 
      free23ai:
        condition: service_healthy
      second23ai:
        condition: service_healthy

volumes:
  prom_data:
